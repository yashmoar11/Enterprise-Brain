version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.0
    container_name: graphrag-neo4j
    ports:
      - "7474:7474" # HTTP Interface (Neo4j Browser)
      - "7687:7687" # Bolt Protocol (Driver Connection)
    environment:
      - NEO4J_AUTH=neo4j/password123
      # CRITICAL: Enable APOC and GDS plugins for Vector/Graph capabilities
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      # Security configuration to allow APOC to run internal system calls
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      # Memory tuning for Vector Index performance
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
      # Network listener configuration
      - NEO4J_server_default__listen__address=0.0.0.0
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_plugins:/plugins
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: graphrag-backend
    ports:
      - "8005:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password123
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app # Hot reload for development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graphrag-frontend
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8005 # Client-side browser access
    depends_on:
      - backend
    volumes:
      - ./frontend:/app # Hot reload
      - /app/node_modules
